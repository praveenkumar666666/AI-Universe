<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Universe</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .container{
            margin-top:120px;
        }

        h1{
            font-size:55px;
            color:#38bdf8;
        }

        p{
            font-size:22px;
            color:#d1d5db;
        }

        .btn{
            display:inline-block;
            margin:15px;
            padding:15px 35px;
            text-decoration:none;
            background:#2563eb;
            color:white;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🚀 AI Universe</h1>

    <p>Welcome to your AI-powered platform.</p>

    <a href="/login" class="btn">Login</a>
    <a href="/register" class="btn">Register</a>
    <a href="/chat" class="btn">AI Chat</a>

</div>

</body>
</html>
