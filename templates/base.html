<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}AI Universe{% endblock %}</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Page CSS -->
    {% block css %}{% endblock %}

</head>

<body>

    {% block content %}
    {% endblock %}

    <!-- Global JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Page JavaScript -->
    {% block js %}{% endblock %}

</body>

</html>
