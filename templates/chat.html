<!DOCTYPE html>
<html>
<head>
    <title>AI Universe Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: #111;
            color: white;
            padding: 10px;
            overflow-y: auto;
        }

        .chat-item {
            padding: 10px;
            margin: 5px 0;
            background: #222;
            border-radius: 5px;
            cursor: pointer;
        }

        .chat-item:hover {
            background: #333;
        }

        /* MAIN CHAT */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 10px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 60%;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .ai {
            background: #e5e5e5;
        }

        /* INPUT */
        .input-box {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Chats</h3>

    <a href="/new-chat" style="color:white;">+ New Chat</a>

    {% for c in conversations %}
        <div class="chat-item">
            <a href="/chat/{{ c.id }}" style="color:white; text-decoration:none;">
                {{ c.title }}
            </a>
        </div>
    {% endfor %}
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h3>{{ conversation.title }}</h3>
    </div>

    <div class="messages" id="chat-box">

        {% for msg in messages %}
            <div class="msg {% if msg.role == 'user' %}user{% else %}ai{% endif %}">
                {{ msg.content }}
            </div>
        {% endfor %}

    </div>

    <form method="POST" class="input-box">
        <input type="text" name="message" placeholder="Type message..." required>
        <button type="submit">Send</button>
    </form>

</div>

<!-- AUTO SCROLL -->
<script>
    let box = document.getElementById("chat-box");
    box.scrollTop = box.scrollHeight;
</script>

</body>
</html>
