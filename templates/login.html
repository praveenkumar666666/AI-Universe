{% extends "base.html" %}

{% block title %}
Login | AI Universe
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-box">

        <h1>🔑 Login</h1>

        <p>Welcome back to AI Universe</p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-link">

            Don't have an account?

            <a href="{{ url_for('auth.register') }}">
                Register
            </a>

        </div>

    </div>

</div>

{% endblock %}
